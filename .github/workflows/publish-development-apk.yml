name: Publish development Android APK

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "convex/**"
      - "patches/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-development-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: development-android-apk
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_ENV: production
      EXPO_PUBLIC_CONVEX_URL: ${{ vars.DEV_CONVEX_URL }}
      EXPO_PUBLIC_DIRECT_FCM_ENABLED: "true"
      ANDROID_PACKAGE_NAME: com.anonymous.rinnallaapp
      ANDROID_DEV_KEY_ALIAS: rinnalla-development
      ANDROID_DEV_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DEV_KEYSTORE_PASSWORD }}
      ANDROID_DEV_KEY_PASSWORD: ${{ secrets.ANDROID_DEV_KEY_PASSWORD }}
      APK_NAME: rinnalla-development.apk
      RELEASE_TAG: development

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Prepare development configuration and signing key
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_DEV_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEV_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          require_value() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "Missing required GitHub variable or secret: $name" >&2
              exit 1
            fi
          }

          require_value "DEV_CONVEX_URL" "$EXPO_PUBLIC_CONVEX_URL"
          require_value "ANDROID_GOOGLE_SERVICES_JSON_BASE64" "$ANDROID_GOOGLE_SERVICES_JSON_BASE64"
          require_value "ANDROID_DEV_KEYSTORE_BASE64" "$ANDROID_DEV_KEYSTORE_BASE64"
          require_value "ANDROID_DEV_KEYSTORE_PASSWORD" "$ANDROID_DEV_KEYSTORE_PASSWORD"
          require_value "ANDROID_DEV_KEY_PASSWORD" "$ANDROID_DEV_KEY_PASSWORD"

          keystore_path="$RUNNER_TEMP/rinnalla-development.jks"
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" \
            | base64 --decode > apps/mobile/google-services.json
          printf '%s' "$ANDROID_DEV_KEYSTORE_BASE64" \
            | base64 --decode > "$keystore_path"
          chmod 600 apps/mobile/google-services.json "$keystore_path"

          jq -e --arg package "$ANDROID_PACKAGE_NAME" \
            '.client | any(.client_info.android_client_info.package_name == $package)' \
            apps/mobile/google-services.json > /dev/null || {
              echo "google-services.json does not contain an Android client for $ANDROID_PACKAGE_NAME." >&2
              exit 1
            }

          keytool -list \
            -keystore "$keystore_path" \
            -storepass "$ANDROID_DEV_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_DEV_KEY_ALIAS" > /dev/null || {
              echo "The development keystore could not be opened or does not contain alias $ANDROID_DEV_KEY_ALIAS." >&2
              exit 1
            }

          version_code=$((100000 + GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))
          if (( version_code > 2100000000 )); then
            echo "Computed Android versionCode is too large: $version_code" >&2
            exit 1
          fi
          echo "ANDROID_DEV_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$version_code" >> "$GITHUB_ENV"

      - name: Generate the Android project
        working-directory: apps/mobile
        env:
          CI: "1"
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure release signing and version
        run: |
          python3 - <<'PY'
          from pathlib import Path

          build_file = Path("apps/mobile/android/app/build.gradle")
          marker = "// rinnalla.app development release configuration"
          if not build_file.is_file():
              raise SystemExit(f"Expo did not generate {build_file}")

          contents = build_file.read_text(encoding="utf-8")
          if marker in contents:
              raise SystemExit("Development release configuration was already added")

          contents += r'''

          // rinnalla.app development release configuration
          android {
              defaultConfig {
                  versionCode Integer.parseInt(System.getenv("ANDROID_VERSION_CODE"))
              }
              signingConfigs {
                  development {
                      storeFile file(System.getenv("ANDROID_DEV_KEYSTORE_PATH"))
                      storePassword System.getenv("ANDROID_DEV_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_DEV_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_DEV_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.development
                  }
              }
          }
          '''
          build_file.write_text(contents, encoding="utf-8")
          PY

      - name: Build self-contained release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Verify APK
        run: |
          set -euo pipefail

          apk="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          metadata="apps/mobile/android/app/build/outputs/apk/release/output-metadata.json"
          test -s "$apk" || {
            echo "Gradle did not produce $apk." >&2
            exit 1
          }

          jq -e \
            --arg package "$ANDROID_PACKAGE_NAME" \
            --argjson versionCode "$ANDROID_VERSION_CODE" \
            '.applicationId == $package and .elements[0].versionCode == $versionCode' \
            "$metadata" > /dev/null || {
              echo "APK package name or versionCode does not match the requested build." >&2
              exit 1
            }

          unzip -Z1 "$apk" | grep -Fxq 'assets/index.android.bundle' || {
            echo "The APK does not contain the embedded React Native bundle." >&2
            exit 1
          }

          apksigner="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner" || {
            echo "Could not locate apksigner in the Android SDK." >&2
            exit 1
          }
          signing_report="$("$apksigner" verify --verbose --print-certs "$apk")"
          printf '%s\n' "$signing_report"

          expected_certificate_sha256="$(
            keytool -exportcert \
              -keystore "$ANDROID_DEV_KEYSTORE_PATH" \
              -storepass "$ANDROID_DEV_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_DEV_KEY_ALIAS" \
              | sha256sum \
              | cut -d ' ' -f 1
          )"
          printf '%s\n' "$signing_report" \
            | grep -Eq "certificate SHA-256 digest: ${expected_certificate_sha256}$" || {
              echo "The APK was not signed by the configured development key." >&2
              exit 1
            }

          mkdir -p "$RUNNER_TEMP/development-apk"
          cp "$apk" "$RUNNER_TEMP/development-apk/$APK_NAME"

      - name: Publish rolling development release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          apk="$RUNNER_TEMP/development-apk/$APK_NAME"
          notes=$(printf '%s\n\n%s\n%s\n%s\n' \
            'Automated development build of rinnalla.app for Android.' \
            "- Commit: \`$GITHUB_SHA\`" \
            "- Android versionCode: \`$ANDROID_VERSION_CODE\`" \
            '- Backend: development')

          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$RELEASE_TAG" --force
            gh release edit "$RELEASE_TAG" \
              --title "rinnalla.app development" \
              --notes "$notes" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$apk" --clobber
          else
            gh release create "$RELEASE_TAG" "$apk" \
              --target "$GITHUB_SHA" \
              --title "rinnalla.app development" \
              --notes "$notes" \
              --prerelease
          fi
