name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, typecheck, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.DEV_CONVEX_URL }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify development backend URL
        run: |
          test -n "$NEXT_PUBLIC_CONVEX_URL" || {
            echo "Set the DEV_CONVEX_URL repository variable before verifying." >&2
            exit 1
          }

      - name: Verify repository
        run: npm run verify
